version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: siren-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME:-siren}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-siren_password}
      POSTGRES_DB: ${DB_NAME:-siren_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: siren-backend
    env_file:
      - .env
    environment:
      DB_HOST: postgres
    ports:
      - '3001:3001'
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - postgres
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: siren-frontend
    environment:
      VITE_API_URL: http://localhost:3001/api/v1
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
